name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: typecheck · regression · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun global store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache node_modules
        id: node_modules_cache
        uses: actions/cache@v4
        with:
          path: node_modules
          # 精确 key 命中时可完全跳过 install;否则回退到最近一次同 OS 的 node_modules
          # 作为增量起点,再由 bun install 补齐差异。
          key: ${{ runner.os }}-node_modules-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-node_modules-

      - name: Cache Vite build cache
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('vite.config.ts', 'tsconfig*.json', 'bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Install dependencies (skip if node_modules cache hit exactly)
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Verify install (cache hit)
        if: steps.node_modules_cache.outputs.cache-hit == 'true'
        run: bun install --frozen-lockfile --no-progress --production=false --dry-run || bun install --frozen-lockfile

      - name: Type check
        run: bunx tsgo --noEmit

      - name: Regression tests
        run: bun run test:regression

      - name: Full test suite
        run: bun run test

      - name: Build
        run: bun run build
